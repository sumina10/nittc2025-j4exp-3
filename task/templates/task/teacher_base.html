{% load django_bootstrap5 %}

{% bootstrap_css %}
{% bootstrap_javascript %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>教師用HOME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #ffffff;
        }

        .header {
            background-color: #00587A;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        .status-icon {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-submitted {
            background-color: green;
        }

        .status-in-progress {
            background-color: orange;
        }

        .status-resubmit-working {
            background-color: yellow;
        }

        .status-resubmitted {
            background-color: blue;
        }

        .table th {
            background-color: #00587A;
            color: white;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .action-icon {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- ヘッダー -->
    <div class="header">
        <h1>教師用HOME</h1>
        <div>
            {% block header_button %}
            <button class="btn btn-light me-2">新規作成</button>
            <button class="btn btn-light">通知</button>
            {% endblock %}
        </div>
    </div>

    {% block content %}
    {% endblock %}
</body>

</html>
