{% load django_bootstrap5 %}

{% bootstrap_css %}
{% bootstrap_javascript %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>学生用HOME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
        }

        :root {
            --bs-primary: #00587A;
            --bs-primary-rgb: 0, 88, 172;
        }

        .status-icon {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-submitted {
            background-color: green;
        }

        .status-in-progress {
            background-color: orange;
        }

        .status-resubmit-working {
            background-color: yellow;
        }

        .status-resubmitted {
            background-color: blue;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .action-icon {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- ヘッダー -->
    <nav class="navbar navbar-expand-lg navbar-light bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="{% url 'student-home' %}">
                学生用HOME
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item m-lg-1">
                        <a class="btn btn-outline-light" href="{% url 'task-create' %}">課題作成</a>
                    </li>
                    <li class="nav-item m-lg-1">
                        <a class="btn btn-outline-light" href="{% url 'student-notify' %}">通知</a>
                    </li>
                    <li class="nav-item m-lg-1">
                        <a class="btn btn-outline-light" href="{% url 'profile' %}">プロフィール</a>
                    </li>
                    {% block header_button %}
                    {% endblock %}
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>

</html>
