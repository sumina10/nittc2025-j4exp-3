{% extends "task/student_base.html" %}
{% load django_bootstrap5 %}

{% bootstrap_css %}
{% bootstrap_javascript %}

{% block title %}
課題編集
{% endblock title %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-sm p-4 mx-auto">
        <h2 class="card-title text-center mb-4">課題編集</h2>

        <form action="" method="POST">
            {% csrf_token %}

            {% bootstrap_form_errors form %}
            {% bootstrap_form form %}

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    更新する
                </button>
                <a href="{% url 'student-home' %}" class="btn btn-secondary">
                    キャンセル
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
