{% extends "task/kadaibase.html" %}

{% block content %}
<p> </p>
<form class="p-4 bg-white border rounded shadow-sm">

    <!-- 科目 -->
    <div class="mb-3 row align-items-center">
      <label for="subject" class="col-sm-2 col-form-label fw-bold text-center">科目</label>
      <div class="col-sm-10">
        <select id="subject" class="form-select">
          <option selected disabled>選択</option>
          <option></option>
          <option></option>
          <option></option>
          <option></option>
        </select>
      </div>
    </div>

    <!-- 締切 -->
    <div class="mb-3 row align-items-center">
      <label for="deadline" class="col-sm-2 col-form-label fw-bold text-center">締切</label>
      <div class="col-sm-10">
        <input type="date" id="deadline" class="form-control">
      </div>
    </div>

    <!-- 内容 -->
    <div class="mb-3 row">
      <label for="content" class="col-sm-2 col-form-label fw-bold text-center">内容</label>
      <div class="col-sm-10">
        <textarea id="content" class="form-control" rows="5" placeholder="課題内容を記述"></textarea>
      </div>
    </div>

    <!-- 確認ボタン -->
    <div class="text-end">
      <button type="submit" class="btn btn-primary px-4">確認</button>
    </div>
  </form>
  
{% endblock %}
