{% load django_bootstrap5 %}

{% bootstrap_css %}
{% bootstrap_javascript %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}HOME{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bs-primary: #00587A;
            --bs-primary-rgb: 0, 88, 122;
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <nav class="navbar navbar-expand-lg navbar-light bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="{% url 'profile' %}">
                HOME
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-end">
                    {% if user.is_authenticated %}
                        <li class="nav-item m-lg-1 m-2">
                            <a class="btn btn-outline-light" href="{% url 'profile' %}">
                                プロフィール
                            </a>
                        </li>
                    {% else %}
                        <li class="nav-item m-lg-1 m-2">
                            <a class="btn btn-outline-light" href="{% url 'login' %}">
                                ログイン
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>

</html>
